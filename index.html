<!doctype html>
<html lang="de">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Bestell APP</title>
        <link
            rel="icon"
            type="image/x-icon"
            href="/assets/img/takeout_dining_symbol.png"
        />
        <link rel="stylesheet" href="styles.css" />
        <link rel="stylesheet" href="styles/standard.css" />
        <link rel="stylesheet" href="styles/responsive_design.css" />


        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Palanquin:wght@100;200;300;400;500;600;700&display=swap"
            rel="stylesheet"
        />
    </head>
    <body onload="iterateDishes(), displayBasket()">
        <header class="header-footer header_rd">
            <div id="outter-header" class="outter-header_style">
                <div id="inner-header" class="inner-header-logo-n-menu">
                    <div>
                        <img
                            src="./assets/img/header_logo.png"
                            alt="The Logo of the Bestell App / Burger House Logo. A takeaway bag with a fork inside and the restaurant name."
                            class="header_logo_styling"
                        />
                    </div>
                    <div>
                        <img
                            src="./assets/img/burger_menu.png"
                            alt="An image with three vertical lines that looks like a Burger, that customers can use for navigation."
                            class="burger_menu_styling"
                        />
                    </div>
                </div>
            </div>
        </header>
        <main>
            <section class="hero">
                <div class="hero_wrapper">
                    <img
                        src="./assets/img/hero_background_pic.jpg"
                        alt="A picture various dishes to represent what is offered."
                        class="hero_background"
                    />
                </div>
                <div class="logo_burger_overlay_position">
                    <img
                        src="./assets/img/logo_burger.png"
                        alt="A Logo of an example burger"
                        class="logo_burger_overlay"
                    />
                </div>
            </section>
            <div class="slogan_receptions">
                <div class="logo_n_reception">
                    <div>
                        <img
                            src="./assets/img/BurgerHouse.png"
                            alt="A Picture of the Burger House Logo."
                            class="burgerHouse_size"
                        />
                    </div>
                    <div>
                        <img
                            src="./assets/img/star_receptions.png"
                            alt="This is a Picture of the star rating and number of receptions"
                            class="starReceptions_size"
                        />
                    </div>
                </div>
                <div class="slogan_text">
                    <h1>
                        The best of Burgers, Pizza, and Greens, all in one great
                        place.
                    </h1>
                </div>
            </div>
            <!-- The following div should be a template and be repeated for other categories. -->
            <div class="categorie_wrapper" id="categorie_wrapper">
            </div>
            <section id="menu_card_wrapper" class="menu_card"></section>

            <dialog id="myDialog" class="myDialog">
                <div id="dialog-header" class="dialog-header-class">
                    <img
                        src="./assets/img/close_icon.png"
                        alt="Symbol to Close the Dialog"
                        id="closing-button"
                        class="closing_btn pointer"
                        onclick="closeOrderDialog()"
                    />
                </div>
                <div id="dialog-main" class="dialog-main-style"></div>
                    <div id="order_confirmation" class="dialog-order_confirmation">
                        <img src="./assets/img/delivery_car.png" alt="This is an Image of an Delivery car" class="delivery_car">
                        <p class="font_size_OC">Order confirmed!</p>
                        <p class="font_size_dialog">Your food is on the way!</p>
                    </div>
                </div>
            </dialog>
        </main>
        <footer class="header-footer">
            <p>2025 BurgerHouse</p>
            <p>Imprint</p>
            <p>Cookie Preferences</p>
        </footer>
        <nav class="nav-mobile nav-desktop"></nav>
            <div class="nav_basket nav-desktop">
                <img src="./assets/img/home.png" alt="A Picture of an home Symbol to open your home." class="pointer">
                <img src="./assets/img/profile.png" alt="A Picture of an profile Symbol to open your profile." class="pointer">
                <img src="./assets/img/orders.png" alt="A Picture of an orders Symbol to open your orders." class="pointer">
                <img src="./assets/img/nav_basket.png" alt="A Picture of an basket Symbol to open your basket." onclick="toggleBasket()" class="pointer">
            </div>
        </nav>
    </body>
    <script src="./scripts/db.js"></script>
    <script src="./scripts/template.js"></script>
    <script src="./scripts/script.js"></script>
</html>
